name: Publish test image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-test-image.yml"
      - "cmd/**"
      - "docker/**"
      - "go.*"
      - "internal/**"
      - "pkg/**"
      - "web/**"
      - "Makefile"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/besendorf/premiumizearr-nova

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build app
        run: make build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:folder-fix
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
